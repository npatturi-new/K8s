apiVersion: v1
kind: Pod
metadata:
  name: order-api-pod
  labels:
    app: order-api
    env: production
spec:
  containers:
    - name: order-api
      image: order-api:v1.0
      ports:
        - containerPort: 8080
      env:
        - name: DB_HOST
          value: "mysql-service"
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 10