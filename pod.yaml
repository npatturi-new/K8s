apiVersion: v1
kind: Pod
metadata:
  name: order-api
  labels:
    app: order-api
    team: backend
spec:
  containers:
  - name: order-api
    image: python:3.11-slim
    command: ["python3", "-m", "http.server", "8080"]
    ports:
    - containerPort: 8080
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"