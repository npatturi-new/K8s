apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  annotations:
    kubernetes.io/change-cause: "Initial deployment v1.0"
spec:
  replicas: 5
  selector:
    matchLabels: { app: myapp }
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels: { app: myapp }
    spec:
      containers:
      - name: myapp
        image: nginx:1.23
        ports:
        - containerPort: 80