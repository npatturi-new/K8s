apiVersion: apps/v1
kind: Deployment
metadata: { name: frontend, namespace: production }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
      - name: nginx
        image: nginx
        ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: frontend-service, namespace: production }
spec:
  selector: { app: frontend }
  ports: [{ port: 80 }]
