apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: production
spec:
  clusterIP: None
  selector: { app: mysql }
  ports: [{ port: 3306 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: production
spec:
  serviceName: mysql-service
  replicas: 1
  selector:
    matchLabels: { app: mysql }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef: { name: app-secrets, key: DB_PASSWORD }
        - name: MYSQL_DATABASE
          valueFrom:
            configMapKeyRef: { name: app-config, key: DB_NAME }
        volumeMounts:
        - name: mysql-pvc
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata: { name: mysql-pvc }
    spec:
      accessModes: ["ReadWriteOnce"]
      resources: { requests: { storage: 1Gi } }
