apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels: { app: flask-api }
  template:
    metadata:
      labels: { app: flask-api }
    spec:
      containers:
      - name: flask-api
        image: nginx
        ports: [{ containerPort: 80 }]
        envFrom:
        - configMapRef: { name: app-config }
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef: { name: app-secrets, key: DB_PASSWORD }
        resources:
          requests: { memory: "64Mi", cpu: "100m" }
          limits:   { memory: "128Mi", cpu: "200m" }
---
apiVersion: v1
kind: Service
metadata: { name: api-service, namespace: production }
spec:
  selector: { app: flask-api }
  ports: [{ port: 80 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: flask-hpa, namespace: production }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flask-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: { type: Utilization, averageUtilization: 70 }
